version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=./database.sqlite
      - NEXT_PUBLIC_APP_NAME=Landing Page Pro
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - ./database.sqlite:/app/database.sqlite
    restart: unless-stopped